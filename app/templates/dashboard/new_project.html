{% extends 'base.html' %}
{% block title %}새 프로젝트 - 사업모델캔버스{% endblock %}
{% block content %}
<div class="page-header">
    <h1 class="page-title">새 프로젝트 만들기</h1>
</div>
<div class="form-card">
    <form method="POST">
        <div class="form-group">
            <label>프로젝트 이름 <span class="required">*</span></label>
            <input type="text" name="name" placeholder="예: 2025년 신사업 전략" required autofocus>
        </div>
        <div class="form-group">
            <label>수행 조직</label>
            <input type="text" name="organization" placeholder="예: 전략기획팀, 사업개발본부">
        </div>
        <div class="form-group">
            <label>사업 담당</label>
            <input type="text" name="business_manager" placeholder="사업 담당자 이름">
        </div>
        <div class="form-group">
            <label>수행 담당</label>
            <input type="text" name="project_manager" placeholder="수행 담당자 이름">
        </div>
        <div class="form-group">
            <label>프로젝트 설명</label>
            <textarea name="description" rows="3" placeholder="프로젝트에 대한 간략한 설명을 입력하세요"></textarea>
        </div>
        <div class="form-group">
            <label>공개 설정</label>
            <div class="toggle-row">
                <label class="toggle-switch">
                    <input type="checkbox" name="is_public" value="1">
                    <span class="toggle-slider"></span>
                </label>
                <span class="toggle-label">전체 공개 — 다른 사용자도 이 프로젝트를 열람할 수 있습니다.</span>
            </div>
        </div>
        <div class="form-actions">
            <a href="{{ url_for('dashboard.index') }}" class="btn btn-ghost">취소</a>
            <button type="submit" class="btn btn-primary">프로젝트 생성</button>
        </div>
    </form>
</div>
{% endblock %}

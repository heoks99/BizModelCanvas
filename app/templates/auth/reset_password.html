{% extends 'base.html' %}
{% block title %}비밀번호 재설정 - 사업모델캔버스{% endblock %}
{% block auth_content %}
<div class="auth-card">
    <div class="auth-header">
        <div class="auth-logo">◈</div>
        <h1>새 비밀번호 설정</h1>
        <p>새로 사용할 비밀번호를 입력해주세요.</p>
    </div>
    <form method="POST" class="auth-form">
        <div class="form-group">
            <label>새 비밀번호</label>
            <input type="password" name="new_password" placeholder="새 비밀번호 (4자 이상)" required autofocus>
        </div>
        <div class="form-group">
            <label>새 비밀번호 확인</label>
            <input type="password" name="confirm_password" placeholder="비밀번호를 다시 입력하세요" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full">비밀번호 변경</button>
    </form>
    <p class="auth-link"><a href="{{ url_for('auth.login') }}">← 로그인으로 돌아가기</a></p>
</div>
{% endblock %}

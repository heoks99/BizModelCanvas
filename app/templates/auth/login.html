{% extends 'base.html' %}
{% block title %}로그인 - 사업모델캔버스{% endblock %}
{% block auth_content %}
<div class="auth-card">
    <div class="auth-header">
        <div class="auth-logo">◈</div>
        <h1>사업모델캔버스</h1>
        <p>사업모델캔버스</p>
    </div>
    <form method="POST" class="auth-form">
        <div class="form-group">
            <label>아이디</label>
            <input type="text" name="username" placeholder="아이디를 입력하세요" required autofocus>
        </div>
        <div class="form-group">
            <label>비밀번호</label>
            <input type="password" name="password" placeholder="비밀번호를 입력하세요" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full">로그인</button>
    </form>
    <p class="auth-link">계정이 없으신가요? <a href="{{ url_for('auth.register') }}">회원가입</a></p>
    <p class="auth-link"><a href="{{ url_for('auth.forgot_password') }}">비밀번호를 잊으셨나요?</a></p>
</div>
{% endblock auth_content %}

{% extends 'base.html' %}
{% block title %}비밀번호 찾기 - 사업모델캔버스{% endblock %}
{% block auth_content %}
<div class="auth-card">
    <div class="auth-header">
        <div class="auth-logo">◈</div>
        <h1>비밀번호 찾기</h1>
        <p>가입 시 등록한 이메일 주소를 입력하면<br>재설정 링크를 보내드립니다.</p>
    </div>
    <form method="POST" class="auth-form">
        <div class="form-group">
            <label>이메일</label>
            <input type="email" name="email" placeholder="가입 시 이메일을 입력하세요" required autofocus>
        </div>
        <button type="submit" class="btn btn-primary btn-full">재설정 링크 발송</button>
    </form>
    <p class="auth-link"><a href="{{ url_for('auth.login') }}">← 로그인으로 돌아가기</a></p>
</div>
{% endblock %}

{% extends 'base.html' %}
{% block title %}회원 수정 — 관리자{% endblock %}
{% block content %}
<div class="page-header">
    <div>
        <a href="{{ url_for('admin.index') }}" class="back-link">← 관리자</a>
        <h1 class="page-title">회원 정보 수정</h1>
    </div>
</div>

<div class="form-card" style="max-width:600px;">
    <form method="POST">
        <div class="profile-fields">
            <div class="form-group">
                <label>아이디</label>
                <input type="text" class="form-input" value="{{ user.username }}" disabled>
            </div>
            <div class="form-group">
                <label>이름</label>
                <input type="text" name="full_name" class="form-input" value="{{ user.full_name or '' }}">
            </div>
            <div class="form-group">
                <label>이메일 <span class="form-required">*</span></label>
                <input type="email" name="email" class="form-input" value="{{ user.email }}" required>
            </div>
            <div class="form-group">
                <label>조직명</label>
                <input type="text" name="organization" class="form-input" value="{{ user.organization or '' }}">
            </div>
            <div class="form-group">
                <label>직책</label>
                <input type="text" name="job_title" class="form-input" value="{{ user.job_title or '' }}">
            </div>
            <div class="form-group">
                <label>새 비밀번호 <span class="form-optional">(변경 시만 입력)</span></label>
                <input type="password" name="new_password" class="form-input" placeholder="변경하지 않으면 비워두세요">
            </div>
            <div class="form-group">
                <label>역할</label>
                <select name="role" class="form-select">
                    <option value="member" {% if user.role == 'member' %}selected{% endif %}>일반 회원</option>
                    <option value="admin"  {% if user.role == 'admin'  %}selected{% endif %}>관리자</option>
                </select>
            </div>
            <div class="form-group">
                <label>상태</label>
                <select name="status" class="form-select">
                    <option value="pending"  {% if user.status == 'pending'  %}selected{% endif %}>대기</option>
                    <option value="active"   {% if user.status == 'active'   %}selected{% endif %}>활성</option>
                    <option value="inactive" {% if user.status == 'inactive' %}selected{% endif %}>비활성</option>
                </select>
            </div>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:16px; padding-top:16px; border-top:1px solid var(--border);">
            <a href="{{ url_for('admin.index') }}" class="btn btn-ghost">취소</a>
            <button type="submit" class="btn btn-primary">저장</button>
        </div>
    </form>
</div>
{% endblock %}
